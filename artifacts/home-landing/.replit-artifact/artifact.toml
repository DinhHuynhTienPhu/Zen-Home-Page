kind = "web"
previewPath = "/"
title = "Personal Home Landing"
version = "1.0.0"
id = "artifacts/home-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24594

[services.development]
run = "pnpm --filter @workspace/home-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/home-landing", "run", "build" ]
publicDir = "artifacts/home-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24594"
BASE_PATH = "/"
